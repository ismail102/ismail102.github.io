<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Ismail Hossain">
  <title>Gallery | Ismail Hossain</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style/redesign.css">

  <style>
    .feature-row { display: flex; gap: 18px; align-items: center; flex-wrap: wrap; margin-bottom: 32px; }
    .feature-row a img { height: 70px; width: auto; border-radius: 8px; }
    .viewer { display: grid; grid-template-columns: 1fr 220px; gap: 16px; align-items: start; }
    .viewer-main { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-sm); }
    .preview-media { position: relative; background: var(--surface-3); min-height: 360px; display: flex; align-items: center; justify-content: center; }
    .preview-media img, .preview-media video { width: 100%; max-height: 460px; object-fit: contain; display: block; }
    .viewer-cap { padding: 18px 22px; }
    .viewer-cap h3 { font-family: var(--font-serif); font-size: 22px; font-weight: 500; color: var(--ink); margin: 0 0 4px; }
    .viewer-cap p { color: var(--ink-light); margin: 0; font-size: 14.5px; }
    .viewer-foot { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 16px 22px; border-top: 1px solid var(--border); }
    .viewer-foot .count { font-family: var(--font-mono); font-size: 13px; color: var(--ink-faint); }
    .thumbs { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 12px; max-height: 560px; overflow-y: auto; }
    .thumbs .thumbnail { width: 100%; height: 110px; object-fit: cover; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: border-color .15s; }
    .thumbs .thumbnail.active { border-color: var(--accent); }
    .dl-card a { display: flex; align-items: center; gap: 12px; padding: 14px 16px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; color: var(--ink); font-size: 14.5px; transition: border-color .15s, transform .15s; }
    .dl-card a:hover { border-color: var(--accent); transform: translateX(3px); color: var(--accent); }
    @media (max-width: 760px) { .viewer { grid-template-columns: 1fr; } .thumbs { display: flex; gap: 10px; max-height: none; } .thumbs .mb-3 { min-width: 150px; } }
  </style>
</head>
<body>

  <main class="wrap page page-anim">
    <header class="page-head">
      <p class="eyebrow">Moments</p>
      <h1 class="page-title">Gallery &amp; <em>memories</em></h1>
      <p class="page-lead">Conferences, lab life, teaching, and milestones from the journey.</p>
    </header>

    <div class="feature-row">
      <a href="https://www.youtube.com/watch?v=Rl4lV6oQo-Y&t=212s&ab_channel=BlueDream23" target="_blank" rel="noopener"><img src="../images/icons/youtube.png" alt="YouTube"></a>
      <a href="https://www.youtube.com/watch?v=Rl4lV6oQo-Y&t=212s&ab_channel=BlueDream23" target="_blank" rel="noopener"><img src="../images/icons/CyberForce_2023.png" alt="CyberForce 2023" style="height:90px;"></a>
    </div>

    <section>
      <div class="section-label">2025 Memories</div>
      <div class="viewer">
        <div class="viewer-main">
          <div class="preview-media" id="previewMedia"></div>
          <div class="viewer-cap">
            <h3 id="mediaTitle">Loadingâ€¦</h3>
            <p id="mediaDescription"></p>
          </div>
          <div class="viewer-foot">
            <button class="btn" id="prevBtn"><i class="fas fa-chevron-left"></i> Previous</button>
            <span class="count"><span id="currentIndex">1</span> / <span id="totalItems">9</span></span>
            <button class="btn" id="nextBtn">Next <i class="fas fa-chevron-right"></i></button>
          </div>
        </div>
        <div class="thumbs" id="thumbnailList"></div>
      </div>
    </section>

    <section class="block">
      <div class="section-label">Year 2024 â€” CyberForce &amp; Lab</div>
      <div class="gal-grid">
        <img src="../images/cf/cf1.jpg" alt="2024 memory">
        <img src="../images/cf/cf2.jpg" alt="2024 memory">
        <img src="../images/cf/cf3.jpg" alt="2024 memory">
        <img src="../images/cf/cf4.jpg" alt="2024 memory">
        <img src="../images/cf/cf5.jpg" alt="2024 memory">
        <img src="../images/cf/cf6.jpg" alt="2024 memory">
        <img src="../images/cf/cf7.jpg" alt="2024 memory">
        <img src="../images/cf/cf8.jpg" alt="2024 memory">
        <img src="../images/cf/cf9.jpg" alt="2024 memory">
      </div>
    </section>

    <section class="block">
      <div class="section-label">Download Files</div>
      <div class="dl-card" style="max-width:520px;">
        <a href="resources/ai-in-the-loop-poster.pdf" download><i class="fas fa-file-pdf" style="color:var(--accent);"></i> AI-in-the-Loop Poster Presentation</a>
        <a href="resources/icwsm-conference-poster.jpg" download><i class="fas fa-file-image" style="color:var(--accent);"></i> ICWSM Conference Poster Presentation</a>
        <a href="resources/qualifier-presentation-2025.pdf" download><i class="fas fa-file-pdf" style="color:var(--accent);"></i> PhD Qualifier Presentation</a>
      </div>
    </section>
  </main>

  <script src="scripts/redesign-nav.js"></script>
  <script src="scripts/gallery.js"></script>
</body>
</html>
